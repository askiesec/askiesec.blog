<header class="site-header">
  <a class="logo" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>

  <nav>
    {{ range .Site.Menus.main }}
      <a
        href="{{ .URL }}"
        {{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}class="active"{{ end }}>
        {{ .Name }}
      </a>
    {{ end }}
  </nav>
</header>
