{{ define "main" }}
<div class="container">
  <h1>{{ .Title }}</h1>

  {{ range (.Paginate .RegularPagesRecursive).Pages }}
    <div class="post-item">
      <a href="{{ .Permalink }}">{{ .Date.Format "2006-01-02" }} &mdash; {{ .Title }}</a>
      {{ with .Description }}
        <br><code>//</code> {{ . }}
      {{ end }}
    </div>
  {{ end }}

  {{ template "_internal/pagination.html" . }}
</div>
{{ end }}
